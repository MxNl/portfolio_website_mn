        href: https://bsky.app/profile/ichmagsnichtmoegen.bsky.social
        aria-label: Bluesky

  page-footer:
    center: "© 2026 Max Nölscher"
    border: true

format:
  html:
    theme: default      # provides Bootstrap 5 so the navbar collapses/works correctly
    css: styles.css   # plain CSS overrides, loaded after cosmo
    toc: false
    include-in-header:
      text: |
        <link rel="stylesheet" href="vendor/glightbox/glightbox.min.css">
    include-after-body:
      text: |
        <script src="vendor/glightbox/glightbox.min.js"></script>
        <script>
        document.addEventListener("DOMContentLoaded", function () {

          // ── Navbar: replace text links with icons ──────────────────────────
          document.querySelectorAll(".navbar-nav .nav-link").forEach(function (link) {
            var label = link.textContent.trim();
            if (label === "Mastodon") {
              link.innerHTML = "<span class='nav-icon nav-icon-mastodon'></span>";
            }
            if (label === "Bluesky") {
              link.innerHTML = "<span class='nav-icon nav-icon-bluesky'></span>";
            }
          });

          // ── Gallery ────────────────────────────────────────────────────────
          var root = document.getElementById("gallery-root");
          var paintings = window.__paintings || [];

          if (!root || paintings.length === 0) return;

          // Group paintings by p.group, preserving order of first appearance
          var groups = {};
          var order = [];
          paintings.forEach(function (p) {
            var g = p.group || "default";
            if (!groups[g]) { groups[g] = []; order.push(g); }
            groups[g].push(p);
          });

          root.innerHTML = order.map(function (g) {
            var items = groups[g].map(function (p) {
              var desc = [p.year, p.medium, p.format].filter(Boolean).join(" \u00B7 ");
              var safeGallery = g.replace(/[^a-z0-9]+/gi, "-").toLowerCase();
              return [
                '<a class="gallery-item glightbox"',
                '   href="images/paintings/' + p.file + '"',
                '   data-gallery="' + safeGallery + '"',
                '   data-title="' + p.title + '"',
                '   data-description="' + desc + '">',
                '  <img src="images/paintings/' + p.file + '" alt="' + p.title + '" loading="lazy">',
                '  <div class="gallery-overlay">',
                '    <span class="gallery-title">' + p.title + '</span>',
                desc ? '    <span class="gallery-desc">' + desc + '</span>' : '',
                '  </div>',
                '</a>'
              ].join("\n");
            }).join("\n");

            var heading = g === "default"
              ? ""
              : '<h2 class="gallery-group-title">' + g + '</h2>';
            return heading + '<div class="gallery-grid">' + items + '</div>';
          }).join("\n");

          GLightbox({ selector: ".glightbox", loop: true, touchNavigation: true });
        });
        </script>
 
execute:
  echo: false
  warning: false
  message: false
