project:
  type: website
  output-dir: _site
  resources:
    - images/

website:
  title: "Your Name"
  description: "Artist portfolio"

  navbar:
    left:
      - href: index.qmd
        text: Work
      - href: about.qmd
        text: About
    right:
      - icon: instagram
        href: https://instagram.com/yourhandle
        aria-label: Instagram

  page-footer:
    center: "© 2025 Your Name"
    border: true

format:
  html:
    theme: cosmo       # provides Bootstrap 5 so the navbar collapses/works correctly
    css: styles.css  # our overrides, loaded after cosmo
    toc: false
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
    include-after-body:
      text: |
        <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
        <script>
        document.addEventListener("DOMContentLoaded", function () {
          var root = document.getElementById("gallery-root");
          var paintings = window.__paintings || [];

          if (!root || paintings.length === 0) return;

          root.innerHTML = paintings.map(function (p) {
            var desc = [p.year, p.medium].filter(Boolean).join(" \u00B7 ");
            return [
              '<a class="gallery-item glightbox"',
              '   href="images/paintings/' + p.file + '"',
              '   data-gallery="paintings"',
              '   data-title="' + p.title + '"',
              '   data-description="' + desc + '">',
              '  <img src="images/paintings/' + p.file + '" alt="' + p.title + '" loading="lazy">',
              '  <div class="gallery-overlay">',
              '    <span class="gallery-title">' + p.title + '</span>',
              desc ? '    <span class="gallery-desc">' + desc + '</span>' : '',
              '  </div>',
              '</a>'
            ].join("\n");
          }).join("\n");

          GLightbox({ selector: ".glightbox", loop: true, touchNavigation: true });
        });
        </script>

execute:
  echo: false
  warning: false
  message: false
