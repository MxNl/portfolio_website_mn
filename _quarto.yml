project:
  type: website
  output-dir: _site
  resources:
    - images/         # copy all images to _site/ even though they're loaded via JS
    - fonts/

website:
  title: "Max Nölscher"
  description: "Artist portfolio"

  navbar:
    left:
      - href: index.qmd
        text: Work
      - href: about.qmd
        text: About
    right:
      - icon: mastodon
        href: https://toot.community/@ichmagsnichtmoegen@toot.community
        aria-label: Mastodon
      - text: "<i class='fa-brands fa-bluesky'></i>"
        href: https://bsky.app/profile/ichmagsnichtmoegen.bsky.social
        aria-label: Bluesky

  page-footer:
    center: "© 2026 Max Nölscher"
    border: true

format:
  html:
    theme: cosmo      # provides Bootstrap 5 so the navbar collapses/works correctly
    css: styles.css   # plain CSS overrides, loaded after cosmo
    toc: false
    include-in-header:
      text: |
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css">
    include-after-body:
      text: |
        <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
        <script>
        document.addEventListener("DOMContentLoaded", function () {
          var root = document.getElementById("gallery-root");
          var paintings = window.__paintings || [];
 
          if (!root || paintings.length === 0) return;
 
          root.innerHTML = paintings.map(function (p) {
            var desc = [p.year, p.medium, p.format].filter(Boolean).join(" \u00B7 ");
            return [
              '<a class="gallery-item glightbox"',
              '   href="images/paintings/' + p.file + '"',
              '   data-gallery="paintings"',
              '   data-title="' + p.title + '"',
              '   data-description="' + desc + '">',
              '  <img src="images/paintings/' + p.file + '" alt="' + p.title + '" loading="lazy">',
              '  <div class="gallery-overlay">',
              '    <span class="gallery-title">' + p.title + '</span>',
              desc ? '    <span class="gallery-desc">' + desc + '</span>' : '',
              '  </div>',
              '</a>'
            ].join("\n");
          }).join("\n");
 
          GLightbox({ selector: ".glightbox", loop: true, touchNavigation: true });
        });
        </script>
 
execute:
  echo: false
  warning: false
  message: false
